{% load widget_tweaks %}
<form method="post">
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div class="alert alert-error">{{ form.non_field_errors.0 }}</div>
    {% endif %}
    <div class="form-group"><label>Skill Name</label>{{ form.name }}</div>
    <div class="form-group"><label>Description</label>{{ form.description }}</div>
    <div class="form-row">
        <div class="form-group"><label>Status</label>{{ form.status }}</div>
        <div class="form-group"><label>Priority</label>{{ form.priority }}</div>
        <div class="form-group"><label>Target Completion</label>{{ form.target_completion_date }}</div>
    </div>
    <div class="btn-group mt-3">
        <button type="submit" class="btn btn-emerald">{% if is_new %}Add Skill{% else %}Update{% endif %}</button>
        <a href="{% url 'skills:skill_list' %}" class="btn btn-outline">Cancel</a>
    </div>
</form>

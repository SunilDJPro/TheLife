{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheLife — Sign In</title>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand">
                <h1>TheLife</h1>
                <p>Live your life. Own every hour.</p>
            </div>

            {% if form.errors %}
            <div class="alert alert-error">
                Invalid credentials. Please try again.
            </div>
            {% endif %}

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Email or Username</label>
                    {{ form.username }}
                </div>
                <div class="form-group">
                    <label for="id_password">Password</label>
                    {{ form.password }}
                </div>
                <button type="submit" class="btn btn-cyan" style="width:100%; justify-content:center; margin-top:8px;">
                    Sign In
                </button>
            </form>

            <p style="text-align:center; margin-top:24px; font-size:0.75rem; color:var(--text-muted);">
                Account creation is managed by admin.
            </p>
        </div>
    </div>
</body>
</html>

{% load widget_tweaks %}
{% if saved %}<div class="alert alert-success">Profile updated.</div>{% endif %}
<form method="post" action="{% url 'accounts:profile' %}">
    {% csrf_token %}
    <div class="form-row">
        <div class="form-group"><label>Display Name</label>{{ form.display_name }}</div>
        <div class="form-group"><label>Timezone</label>{{ form.timezone }}</div>
    </div>
    <div class="form-row">
        <div class="form-group"><label>Wake Time</label>{{ form.wake_time }}</div>
        <div class="form-group"><label>Sleep Time</label>{{ form.sleep_time }}</div>
        <div class="form-group"><label>Log Interval (hrs)</label>{{ form.log_interval_hours }}</div>
        <div class="form-group"><label>Max Active Skills</label>{{ form.max_active_skills }}</div>
    </div>
    <div class="form-group">
        <label>Long-Term Goals (for AI scoring)</label>
        {{ form.long_term_goals }}
    </div>
    <button type="submit" name="save_profile" class="btn btn-cyan">Save Profile</button>
</form>

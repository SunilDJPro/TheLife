<div class="form-row">
    <div class="form-group">
        <label>Mode</label>
        <select name="meta_mode" class="form-input form-input-sm">
            <option value="drive">Drive</option>
            <option value="public_transit">Public Transit</option>
            <option value="walk">Walk</option>
            <option value="bike">Bike</option>
            <option value="ride">Ride</option>
        </select>
    </div>
    <div class="form-group">
        <label>From</label>
        <input type="text" name="meta_from_location" class="form-input form-input-sm" placeholder="From">
    </div>
    <div class="form-group">
        <label>To</label>
        <input type="text" name="meta_to_location" class="form-input form-input-sm" placeholder="To">
    </div>
</div>

<div class="form-row">
    <div class="form-group">
        <label>Meal Type</label>
        <select name="meta_meal_type" class="form-input form-input-sm">
            <option value="breakfast">Breakfast</option>
            <option value="lunch">Lunch</option>
            <option value="dinner">Dinner</option>
            <option value="snack">Snack</option>
        </select>
    </div>
    <div class="form-group">
        <label>Home Cooked?</label>
        <input type="checkbox" name="meta_home_cooked" class="form-checkbox" value="true">
    </div>
</div>

{% load widget_tweaks %}
<form method="post" action="{% url 'work:project_create' %}"
      hx-post="{% url 'work:project_create' %}" hx-target="#project-list" hx-swap="innerHTML">
    {% csrf_token %}
    <div class="form-group"><label>Project Name</label>{{ form.name }}</div>
    <div class="form-row">
        <div class="form-group"><label>Status</label>{{ form.status }}</div>
        <div class="form-group"><label>Priority</label>{{ form.priority }}</div>
    </div>
    <button type="submit" class="btn btn-cyan btn-sm">Create</button>
</form>
